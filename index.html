<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camera Sync Web App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <h1>Camera Sync App</h1>
        
        <div class="status">
            <p>Connected: <span id="connected-count">0</span></p>
            <p id="debug-message">Ready to connect</p>
            <p id="camera-status">Camera not initialized</p>
        </div>

        <!-- Home Screen -->
        <div id="home-screen" class="screen">
            <button id="be-controller-btn" class="btn green">Be Controller</button>
            <button id="join-session-btn" class="btn orange">Join Session</button>
        </div>

        <!-- Controller Screen -->
        <div id="controller-screen" class="screen hidden">
            <video id="controller-preview" autoplay muted playsinline></video>
            <button id="trigger-cameras-btn" class="btn red" disabled>Trigger All Cameras</button>
            <button id="stop-hosting-btn" class="btn gray">Stop Hosting / Back</button>
        </div>

        <!-- Receiver Screen -->
        <div id="receiver-screen" class="screen hidden">
            <video id="receiver-preview" autoplay muted playsinline></video>
            <p class="waiting-text">Waiting for camera trigger...</p>
            <button id="reconnect-btn" class="btn blue hidden">Reconnect</button>
            <button id="back-home-btn" class="btn gray">Back to Home</button>
        </div>

        <!-- Join Options Modal -->
        <div id="join-modal" class="modal hidden">
            <div class="modal-content">
                <h3>How do you want to connect?</h3>
                <button id="scan-qr-btn" class="btn blue">Scan QR Code</button>
                <button id="manual-id-btn" class="btn orange">Enter ID Manually</button>
                <button id="cancel-join-btn" class="btn gray">Cancel</button>
            </div>
        </div>

        <!-- QR Scanner Modal -->
        <div id="qr-scanner-modal" class="modal hidden">
            <div class="modal-content scanner-modal">
                <h3>Scan Controller's QR Code</h3>
                <video id="qr-video" autoplay muted playsinline></video>
                <canvas id="qr-canvas" class="hidden"></canvas>
                <p id="qr-status">Position QR code in view</p>
                <button id="cancel-scan-btn" class="btn gray">Cancel</button>
            </div>
        </div>

        <!-- Manual ID Input Modal -->
        <div id="id-input-modal" class="modal hidden">
            <div class="modal-content">
                <h3>Enter Controller ID</h3>
                <input type="text" id="controller-id-input" placeholder="Paste controller ID here">
                <button id="connect-manual-btn" class="btn blue">Connect</button>
                <button id="cancel-manual-btn" class="btn gray">Cancel</button>
            </div>
        </div>

        <canvas id="capture-canvas" class="hidden"></canvas>
    </div>

    <!-- Load libraries -->
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
    <script>
        // Simple QR code generator function
        function generateQRCode(text, size) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const qrSize = size || 200;
            canvas.width = qrSize;
            canvas.height = qrSize;
            
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, qrSize, qrSize);
            ctx.fillStyle = '#fff';
            ctx.fillRect(20, 20, qrSize-40, qrSize-40);
            ctx.fillStyle = '#000';
            ctx.font = '12px monospace';
            ctx.textAlign = 'center';
            
            const maxChars = 20;
            const lines = [];
            for (let i = 0; i < text.length; i += maxChars) {
                lines.push(text.substr(i, maxChars));
            }
            
            lines.forEach((line, index) => {
                ctx.fillText(line, qrSize/2, 60 + (index * 15));
            });
            
            return canvas;
        }
    </script>
    <script src="script.js"></script>
</body>
</html>
