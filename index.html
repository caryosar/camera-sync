<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camera Sync Web App</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
</head>
<body>
    <div class="app">
        <h1>Camera Sync App</h1>
        
        <div class="status">
            <p>Connected: <span id="connected-count">0</span></p>
            <p id="debug-message">Ready to connect</p>
            <p id="camera-status">Camera not initialized</p>
        </div>

        <!-- Home Screen -->
        <div id="home-screen" class="screen">
            <button id="be-controller-btn" class="btn green">Be Controller</button>
            <button id="join-session-btn" class="btn orange">Scan QR Code to Join</button>
        </div>

        <!-- Controller Screen -->
        <div id="controller-screen" class="screen hidden">
            <video id="controller-preview" autoplay muted playsinline></video>
            <button id="trigger-cameras-btn" class="btn red" disabled>Trigger All Cameras</button>
            <button id="stop-hosting-btn" class="btn gray">Stop Hosting / Back</button>
        </div>

        <!-- Receiver Screen -->
        <div id="receiver-screen" class="screen hidden">
            <video id="receiver-preview" autoplay muted playsinline></video>
            <p class="waiting-text">Waiting for camera trigger...</p>
            <button id="reconnect-btn" class="btn blue hidden">Reconnect</button>
            <button id="back-home-btn" class="btn gray">Back to Home</button>
        </div>

        <!-- QR Scanner Modal -->
        <div id="qr-scanner-modal" class="modal hidden">
            <div class="modal-content scanner-modal">
                <h3>Scan Controller's QR Code</h3>
                <video id="qr-video" autoplay muted playsinline></video>
                <canvas id="qr-canvas" class="hidden"></canvas>
                <p id="qr-status">Position QR code in view</p>
                <button id="cancel-scan-btn" class="btn gray">Cancel</button>
            </div>
        </div>

        <canvas id="capture-canvas" class="hidden"></canvas>
    </div>

    <script src="script.js"></script>
</body>
</html>
